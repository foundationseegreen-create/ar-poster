<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>See Green Foundation — Primate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .poster, .video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .video {
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .video.visible { opacity: 1; }

  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 3px solid #6abf3a;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .corner.visible { opacity: 1; }
  .corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
  .corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
  .corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

  .scanline {
    position: absolute;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #6abf3a, transparent);
    box-shadow: 0 0 20px #6abf3a;
    opacity: 0;
    top: 0;
  }
  .scanline.scanning {
    animation: scan 1.5s ease-in-out forwards;
    opacity: 1;
  }
  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }

  .status {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: #6abf3a;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: opacity 0.4s ease;
    text-shadow: 0 0 10px rgba(106,191,58,0.6);
  }
  .status.hidden { opacity: 0; }

  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(106,191,58,0.25);
    backdrop-filter: blur(10px);
    border: 2px solid #6abf3a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    transition: opacity 0.4s ease, transform 0.3s ease;
    box-shadow: 0 0 30px rgba(106,191,58,0.4);
  }
  .play-btn:active { transform: translate(-50%,-50%) scale(0.95); }
  .play-btn.hidden { opacity: 0; pointer-events: none; }
  .play-btn::after {
    content: '';
    width: 0; height: 0;
    border-left: 22px solid #fff;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 6px;
  }

  .replay-btn {
    position: absolute;
    bottom: 30px;
    right: 30px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    color: #6abf3a;
    border: 1px solid #6abf3a;
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 30;
  }
  .replay-btn.visible { opacity: 1; }
</style>
</head>
<body>
<div class="stage">
  <img class="poster" src="poster.jpg" alt="Primate">
  <video class="video" playsinline webkit-playsinline preload="auto">
    <source src="video.mp4" type="video/mp4">
  </video>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="scanline"></div>
  <div class="status">Tap to reveal</div>
  <button class="play-btn" id="playBtn" aria-label="Play"></button>
  <button class="replay-btn" id="replayBtn">↻ Replay</button>
</div>

<script>
  const playBtn = document.getElementById('playBtn');
  const replayBtn = document.getElementById('replayBtn');
  const video = document.querySelector('.video');
  const corners = document.querySelectorAll('.corner');
  const scanLine = document.querySelector('.scanline');
  const status = document.querySelector('.status');

  function startExperience() {
    playBtn.classList.add('hidden');
    corners.forEach(c => c.classList.add('visible'));
    status.textContent = 'Scanning…';
    scanLine.classList.add('scanning');

    setTimeout(() => {
      status.textContent = 'Playing';
      video.classList.add('visible');
      video.currentTime = 0;
      video.play().catch(() => {});
      setTimeout(() => {
        status.classList.add('hidden');
        corners.forEach(c => c.classList.remove('visible'));
      }, 1500);
    }, 1500);
  }

  function replay() {
    video.classList.remove('visible');
    replayBtn.classList.remove('visible');
    status.classList.remove('hidden');
    status.textContent = 'Scanning…';
    scanLine.classList.remove('scanning');
    void scanLine.offsetWidth;
    
    corners.forEach(c => c.classList.add('visible'));
    status.textContent = 'Scanning…';
    scanLine.classList.add('scanning');

    setTimeout(() => {
      status.textContent = 'Playing';
      video.classList.add('visible');
      video.currentTime = 0;
      video.play().catch(() => {});
      setTimeout(() => {
        status.classList.add('hidden');
        corners.forEach(c => c.classList.remove('visible'));
      }, 1500);
    }, 1500);
  }

  video.addEventListener('ended', () => {
    replayBtn.classList.add('visible');
  });

  playBtn.addEventListener('click', startExperience);
  replayBtn.addEventListener('click', replay);
</script>
</body>
</html>
